<html lang="es">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#4f46e5" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<title>Mis Tareas</title>
<script src="https://cdn.tailwindcss.com"></script>

</head>
<body class="bg-slate-100 min-h-screen text-slate-800">

<div class="max-w-3xl mx-auto p-4 pb-24">

  <!-- Header -->
  <header class="flex items-center justify-between gap-3 mb-4">
    <h1 class="text-2xl font-bold">✅ Mis Tareas</h1>
  </header>
  <div id="sessionAvatarWrap" class="hidden flex w-full overflow-hidden h-32">
    <div class="w-32 ml-auto">
        <img id="sessionAvatar" src="" alt="">
    </div>
  </div>
  <!-- Tabs -->
  <div class="flex gap-1 bg-white rounded-xl shadow p-1 mb-4">
    <button data-tab="daily" class="tab-btn flex-1 py-2 rounded-lg font-medium">Diarias</button>
    <button data-tab="weekly" class="tab-btn flex-1 py-2 rounded-lg font-medium">Semanales</button>
    <button data-tab="calendar" class="tab-btn flex-1 py-2 rounded-lg font-medium">Calendario</button>
  </div>

  <!-- Daily -->
  <section id="daily-tab" class="tab-panel">
    <div class="flex items-center justify-between mb-2">
      <h3 id="dailyScheduleTitle" class="font-semibold text-sm text-slate-500">Horario de hoy</h3>
      <button id="backToTodayBtn" class="hidden text-xs text-indigo-600 font-medium">Volver a hoy</button>
    </div>
    <div id="dailySchedule" class="bg-white rounded-xl shadow max-h-80 overflow-y-auto mb-4"></div>
    <h3 id="dailyListTitle" class="font-semibold text-sm text-slate-500 mb-2">Para hoy</h3>
    <div id="dailyList" class="grid grid-cols-3 gap-3"></div>
  </section>

  <!-- Weekly -->
  <section id="weekly-tab" class="tab-panel">
    <div class="flex items-center justify-between mb-3">
      <button id="prevWeekBtn" class="bg-white shadow px-3 py-1 rounded-lg">←</button>
      <h2 id="weekLabel" class="font-semibold text-lg"></h2>
      <button id="nextWeekBtn" class="bg-white shadow px-3 py-1 rounded-lg">→</button>

      <h2 id="calendarLabel" class="font-semibold text-lg"></h2>

        <label class="flex items-center gap-1 text-xs bg-slate-100 rounded-full px-2 py-1"><input type="checkbox" class="repeatDayCheckbox w-3.5 h-3.5" value="4" /> Vie</label>

      </div>
      <div id="repeatWeekdayField" class="hidden mt-2">
        <label class="text-sm">Día de la semana</label>
        <select id="taskRepeatWeekday" class="block border border-slate-300 rounded-lg px-2 py-1 mt-1">
          <option value="0">Lunes</option>
          <option value="1">Martes</option>
          <option value="2">Miércoles</option>
          <option value="3">Jueves</option>
          <option value="4">Viernes</option>

    <div>

   4. Ve a "Project Settings" > "API" y copia el "Project URL" y la

   Mientras no reemplaces estos valores, la app sigue funcionando
   guardando todo en localStorage (modo local, sin sincronizar).

const SUPABASE_URL = 'https://tqzisceafcxjodoyzrmk.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_5TTAtSCI1gfKaLWATqelOA_zj1mnIYP';
const IMAGES_BUCKET = 'task-images';

const sb = (SUPABASE_URL.includes('TU-PROYECTO') || !window.supabase)
  ? null
  : window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* ------------------------- Sesión por parámetro de URL ------------------------- */
function getSessionUser() {
  const params = new URLSearchParams(location.search);
  const u = (params.get('user') || '').toLowerCase();
  if (u === 'angel') return 'u1';
  if (u === 'anais') return 'u2';
  return null;
}

/* ------------------------- Estado y persistencia ------------------------- */
const state = {
  tasks: JSON.parse(localStorage.getItem('tasks') || '[]'),
  users: { u1: 'Angel', u2: 'Anaís' },
  sessionUser: getSessionUser(),
  activeTab: 'daily',
  filterUser: getSessionUser() || 'all',
  calendarMonth: startOfMonth(new Date()),
  weekStart: startOfWeek(new Date()),
  selectedDate: todayStr(),
};

function persist() {
  localStorage.setItem('tasks', JSON.stringify(state.tasks));
}

/* --------------------------------- Supabase --------------------------------- */
function taskToRow(t) {
  return {
    id: t.id,
    title: t.title,
    description: t.description || null,
    user_key: t.user,
    repeats: t.repeats,
    repeat_every: t.repeatEvery,
    repeat_unit: t.repeatUnit,
    repeat_days: t.repeatDays || null,
    due_date: t.dueDate,
    time: t.time,
    image_url: t.image,
    completed_dates: t.completedDates || [],
    created_at: t.createdAt,
  };
}
function rowToTask(r) {
  return {
    id: r.id,
    title: r.title,
    description: r.description || '',
    user: r.user_key,
    repeats: r.repeats,
    repeatEvery: r.repeat_every,
    repeatUnit: r.repeat_unit,
    repeatDays: r.repeat_days || null,
    dueDate: r.due_date,
    time: r.time,
    image: r.image_url,
    completedDates: r.completed_dates || [],
    createdAt: r.created_at,
  };
}

async function loadTasksFromSupabase() {
  if (!sb) return;
  const { data, error } = await sb.from('tasks').select('*').order('created_at', { ascending: true });
  if (error) { console.error('Error cargando tareas de Supabase:', error.message); return; }
  state.tasks = data.map(rowToTask);
  persist();
}

async function saveTaskToSupabase(task) {
  if (!sb) return;
  const { error } = await sb.from('tasks').upsert(taskToRow(task));
  if (error) alert('Error guardando en Supabase: ' + error.message);
}

async function deleteTaskFromSupabase(id) {
  if (!sb) return;
  const { error } = await sb.from('tasks').delete().eq('id', id);
  if (error) console.error('Error eliminando en Supabase:', error.message);
}

async function uploadImageToSupabase(taskId, dataUrl) {
  if (!sb || !dataUrl || !dataUrl.startsWith('data:')) return dataUrl;
  try {
    const blob = await (await fetch(dataUrl)).blob();
    const ext = (blob.type.split('/')[1] || 'jpg').split('+')[0];
    const path = `${taskId}-${Math.random().toString(36).slice(2, 8)}.${ext}`;
    const { error } = await sb.storage.from(IMAGES_BUCKET).upload(path, blob, { contentType: blob.type, upsert: true });
    if (error) { console.error('Error subiendo imagen a Supabase:', error.message); return dataUrl; }
    const { data } = sb.storage.from(IMAGES_BUCKET).getPublicUrl(path);
    return data.publicUrl;
  } catch (err) {
    console.error('Error subiendo imagen:', err);
    return dataUrl;
  }
}

/* ------------------------------ Utilidades ------------------------------ */
function uid() {
  return 'id-' + Date.now() + '-' + Math.random().toString(36).slice(2, 8);
}
function formatDate(d) {
  const y = d.getFullYear(), m = String(d.getMonth() + 1).padStart(2, '0'), day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}
function startOfDay(d) { const c = new Date(d); c.setHours(0, 0, 0, 0); return c; }
function startOfMonth(d) { return new Date(d.getFullYear(), d.getMonth(), 1); }
function startOfWeek(d) {
  const c = startOfDay(d);
  const offset = (c.getDay() + 6) % 7; // lunes = 0
  c.setDate(c.getDate() - offset);
  return c;
}
function todayStr() { return formatDate(new Date()); }

function resizeImage(file, maxSize = 320) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = reject;
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > height && width > maxSize) { height *= maxSize / width; width = maxSize; }
        else if (height > maxSize) { width *= maxSize / height; height = maxSize; }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        const mimeType = file.type && file.type.startsWith('image/') ? file.type : 'image/png';
        resolve(canvas.toDataURL(mimeType, 0.8));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

/* --------------------------- Lógica de repetición ------------------------- */
function taskStartDate(task) {
  return startOfDay(task.dueDate ? new Date(task.dueDate + 'T00:00:00') : new Date(task.createdAt));
}
function occursOn(task, date) {
  const day = startOfDay(date);
  if (!task.repeats) {
    return task.dueDate === formatDate(day);
  }
  const start = taskStartDate(task);
  if (day < start) return false;
  const diffDays = Math.round((day - start) / 86400000);
  const every = Math.max(1, parseInt(task.repeatEvery, 10) || 1);
  if (task.repeatUnit === 'day') return diffDays % every === 0;
  if (task.repeatUnit === 'weekdays') {
    const dow = (day.getDay() + 6) % 7; // lunes = 0
    return (task.repeatDays || []).includes(dow);
  }
  if (task.repeatUnit === 'week') {
    const weekday = task.repeatDays?.[0];
    if (weekday == null) return diffDays % (7 * every) === 0;
    const dow = (day.getDay() + 6) % 7; // lunes = 0
    if (dow !== weekday) return false;
    const startDow = (start.getDay() + 6) % 7;
    const anchor = new Date(start);
    anchor.setDate(anchor.getDate() + ((weekday - startDow + 7) % 7));
    if (day < anchor) return false;
    const weeksSince = Math.round((day - anchor) / (7 * 86400000));
    return weeksSince % every === 0;
  }
  if (task.repeatUnit === 'month') {
    if (day.getDate() !== start.getDate()) return false;
    const monthDiff = (day.getFullYear() - start.getFullYear()) * 12 + (day.getMonth() - start.getMonth());
    return monthDiff >= 0 && monthDiff % every === 0;
  }
  return false;
}
function visibleForFilter(task) {
  if (state.filterUser === 'all') return true;
  return task.user === state.filterUser || task.user === 'both';
}

/* --------------------------------- Render -------------------------------- */
function renderSessionAvatar() {
  const wrap = document.getElementById('sessionAvatarWrap');
  const img = document.getElementById('sessionAvatar');
  if (state.sessionUser === 'u1') { img.src = 'img/angel.png'; img.alt = 'angel'; wrap.classList.remove('hidden'); }
  else if (state.sessionUser === 'u2') { img.src = 'img/anais.png'; img.alt = 'anais'; wrap.classList.remove('hidden'); }
  else { wrap.classList.add('hidden'); }
}

function render() {
  renderSessionAvatar();
  document.querySelectorAll('.tab-btn').forEach(btn => {
    const active = btn.dataset.tab === state.activeTab;
    btn.className = 'tab-btn flex-1 py-2 rounded-lg font-medium ' + (active ? 'bg-indigo-600 text-white' : 'text-slate-500');
  });
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
  document.getElementById(state.activeTab + '-tab').classList.remove('hidden');

  if (state.activeTab === 'daily') {
    const dateKey = state.selectedDate || todayStr();
    const isToday = dateKey === todayStr();
    document.getElementById('dailyScheduleTitle').textContent = isToday ? 'Horario de hoy' : `Horario del ${dateKey}`;
    document.getElementById('dailyListTitle').textContent = isToday ? 'Para hoy' : `Para el ${dateKey}`;
    document.getElementById('backToTodayBtn').classList.toggle('hidden', isToday);
    renderDailySchedule();
    renderSimpleTab('dailyList', t => occursOn(t, new Date(dateKey + 'T00:00:00')), dateKey);
  }
  if (state.activeTab === 'weekly') {
    renderWeekCalendar();
    renderSimpleTab('weeklyList', t => t.repeats && t.repeatUnit === 'week');
  }
  if (state.activeTab === 'calendar') renderCalendar();

  document.getElementById('emptyState').classList.toggle('hidden', state.tasks.length > 0);
}

function userLabel(userKey) {
  if (userKey === 'both') return 'Ambos';
  return state.users[userKey] || userKey;
}

const DAY_ABBR = ['Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb', 'Dom'];

function taskCardHtml(task, opts = {}) {
  const done = opts.showCheck && task.completedDates?.includes(opts.dateKey || todayStr());
  const repeatInfo = !task.repeats ? '' : task.repeatUnit === 'weekdays'
    ? `🔁 ${(task.repeatDays || []).slice().sort((a, b) => a - b).map(d => DAY_ABBR[d]).join(', ') || 'sin días'}`
    : task.repeatUnit === 'week' && task.repeatDays?.length
      ? `🔁 cada ${task.repeatEvery} semana(s) (${DAY_ABBR[task.repeatDays[0]]})`
      : `🔁 cada ${task.repeatEvery} ${{ day: 'día(s)', week: 'semana(s)', month: 'mes(es)' }[task.repeatUnit]}`;
  const dueInfo = task.dueDate ? `📅 ${task.dueDate}` : '';
  const timeInfo = task.time ? `🕐 ${task.time}` : '';

  if (opts.narrow) {
    return `
    <div class="bg-slate-50 rounded-md px-1 py-1 flex items-start gap-1" data-id="${task.id}">
      <input type="checkbox" data-action="toggleDone" data-date="${opts.dateKey || todayStr()}" ${done ? 'checked' : ''} class="w-3 h-3 mt-0.5 shrink-0" />
      <span data-action="edit" class="text-[11px] leading-tight break-words min-w-0 cursor-pointer ${done ? 'line-through text-slate-400' : ''}">${escapeHtml(task.title)}</span>
    </div>`;
  }

  if (opts.compact) {
    return `
    <div class="bg-white rounded-lg shadow-sm px-2 py-1.5 flex items-center gap-2" data-id="${task.id}">
      <input type="checkbox" data-action="toggleDone" data-date="${opts.dateKey || todayStr()}" ${done ? 'checked' : ''} class="w-4 h-4 shrink-0" />
      <span data-action="edit" class="text-sm truncate flex-1 cursor-pointer ${done ? 'line-through text-slate-400' : ''}">${escapeHtml(task.title)}</span>
      ${timeInfo ? `<span class="text-[10px] text-slate-400 shrink-0">${timeInfo}</span>` : ''}
      <span class="text-[10px] bg-slate-100 rounded-full px-1.5 py-0.5 shrink-0">${userLabel(task.user)}</span>
    </div>`;
  }

  const img = task.image
    ? `<img src="${task.image}" class="w-28 h-28 object-contain rounded-lg mx-auto" />`
    : `<div class="w-28 h-28 rounded-lg bg-slate-100 flex items-center justify-center text-4xl mx-auto">🖼️</div>`;
  return `
  <div class="bg-white rounded-xl shadow p-3" data-id="${task.id}">
    <div class="flex items-start justify-between gap-2">
      <h4 class="min-w-0 font-semibold truncate ${done ? 'line-through text-slate-400' : ''}">${escapeHtml(task.title)}</h4>
      <button type="button" data-action="toggleDetails" class="shrink-0 text-slate-400 hover:text-indigo-600 transition-colors">
        <i class="fa-solid fa-magnifying-glass"></i>
      </button>
    </div>
    <div class="mt-2">${img}</div>
    ${opts.showCheck ? `
    <button type="button" data-action="toggleDone" data-date="${opts.dateKey || todayStr()}" class="mt-2 w-full flex items-center justify-center gap-2 py-1.5 rounded-lg text-sm font-medium transition-colors ${done ? 'bg-emerald-500 text-white' : 'bg-slate-100 text-slate-500'}">
      <i class="fa-solid fa-check"></i>
      <span>Listo</span>
    </button>` : ''}
    <div class="task-details hidden mt-2 pt-2 border-t border-slate-100">
      ${task.description ? `<p class="text-sm text-slate-500">${escapeHtml(task.description)}</p>` : ''}
      <div class="flex flex-wrap gap-2 mt-2 text-xs text-slate-500">
        <span class="bg-slate-100 rounded-full px-2 py-0.5">${userLabel(task.user)}</span>
        ${repeatInfo ? `<span class="bg-slate-100 rounded-full px-2 py-0.5">${repeatInfo}</span>` : ''}
        ${timeInfo ? `<span class="bg-slate-100 rounded-full px-2 py-0.5">${timeInfo}</span>` : ''}
        ${dueInfo ? `<span class="bg-slate-100 rounded-full px-2 py-0.5">${dueInfo}</span>` : ''}
      </div>
      <div class="flex justify-end mt-2">
        <button type="button" data-action="edit" class="text-slate-400 hover:text-indigo-600"><i class="fa-solid fa-pen"></i></button>
      </div>
    </div>
  </div>`;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function renderSimpleTab(containerId, matcher, dateKey) {
  const container = document.getElementById(containerId);
  const list = state.tasks.filter(t => matcher(t) && visibleForFilter(t));
  container.innerHTML = list.length
    ? list.map(t => taskCardHtml(t, { showCheck: true, dateKey })).join('')
    : `<p class="text-center text-slate-400 mt-6">No hay tareas en esta pestaña.</p>`;
}

function renderDailySchedule() {
  const container = document.getElementById('dailySchedule');
  const dateKey = state.selectedDate || todayStr();
  const date = new Date(dateKey + 'T00:00:00');
  const isToday = dateKey === todayStr();
  const now = new Date();
  const nowHour = now.getHours();
  const dayTasks = state.tasks.filter(t => visibleForFilter(t) && occursOn(t, date));

  let html = '';
  for (let h = 0; h < 24; h++) {
    const hourTasks = dayTasks.filter(t => t.time ? parseInt(t.time.split(':')[0], 10) === h : h === nowHour);
    const isNow = isToday && h === nowHour;
    html += `
      <div class="flex gap-2 border-t border-slate-100 px-2 py-1 ${isNow ? 'bg-indigo-50' : ''}" data-hour="${h}">
        <div class="w-12 shrink-0 text-xs pt-1 ${isNow ? 'text-indigo-600 font-semibold' : 'text-slate-400'}">${String(h).padStart(2, '0')}:00</div>
        <div class="flex-1 space-y-1 py-0.5">
          ${hourTasks.map(t => taskCardHtml(t, { showCheck: true, dateKey, compact: true })).join('')}
        </div>
      </div>`;
  }
  container.innerHTML = html;

  if (isToday) {
    const nowRow = container.querySelector(`[data-hour="${nowHour}"]`);
    if (nowRow) nowRow.scrollIntoView({ block: 'center' });
  }
}

function renderWeekCalendar() {
  const label = `${formatDate(state.weekStart)} — ${formatDate(new Date(state.weekStart.getTime() + 6 * 86400000))}`;
  document.getElementById('weekLabel').textContent = label;

  const grid = document.getElementById('weekGrid');
  const dayNames = ['Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb', 'Dom'];
  let html = '';
  for (let i = 0; i < 7; i++) {
    const date = new Date(state.weekStart.getFullYear(), state.weekStart.getMonth(), state.weekStart.getDate() + i);
    const dateKey = formatDate(date);
    const isToday = dateKey === todayStr();
    const isSelected = state.selectedDate === dateKey;
    const dayTasks = state.tasks.filter(t => visibleForFilter(t) && occursOn(t, date));
    html += `
      <div data-day="${dateKey}" class="bg-white rounded-lg shadow p-1.5 min-h-[7rem] overflow-hidden cursor-pointer ${isToday ? 'ring-2 ring-indigo-400' : ''} ${isSelected ? 'ring-2 ring-indigo-600' : ''}">
        <div class="text-center text-xs font-semibold ${isToday ? 'text-indigo-600' : 'text-slate-500'}">${dayNames[i]}<br>${date.getDate()}</div>
        <div class="mt-1 space-y-1">
          ${dayTasks.map(t => taskCardHtml(t, { showCheck: true, dateKey, narrow: true })).join('')}
        </div>
      </div>`;
  }
  grid.innerHTML = html;
}

function renderCalendar() {
  const label = state.calendarMonth.toLocaleDateString('es-ES', { month: 'long', year: 'numeric' });
  document.getElementById('calendarLabel').textContent = label.charAt(0).toUpperCase() + label.slice(1);

  const grid = document.getElementById('calendarGrid');
  const year = state.calendarMonth.getFullYear(), month = state.calendarMonth.getMonth();
  const firstDay = new Date(year, month, 1);
  const startOffset = (firstDay.getDay() + 6) % 7; // lunes = 0
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  let html = ['L', 'M', 'M', 'J', 'V', 'S', 'D'].map(d => `<div class="font-semibold text-slate-400">${d}</div>`).join('');
  for (let i = 0; i < startOffset; i++) html += `<div></div>`;

  for (let d = 1; d <= daysInMonth; d++) {
    const date = new Date(year, month, d);
    const dateKey = formatDate(date);
    const dayTasks = state.tasks.filter(t => visibleForFilter(t) && occursOn(t, date));
    const isToday = dateKey === todayStr();
    const isSelected = state.selectedDate === dateKey;
    html += `
      <button data-day="${dateKey}" class="rounded-lg p-1.5 h-16 flex flex-col items-center justify-start
        ${isSelected ? 'bg-indigo-600 text-white' : isToday ? 'bg-indigo-100' : 'bg-white'} shadow">
        <span class="text-xs">${d}</span>
        ${dayTasks.length ? `<span class="mt-1 w-1.5 h-1.5 rounded-full ${isSelected ? 'bg-white' : 'bg-indigo-500'}"></span><span class="text-[10px] ${isSelected ? 'text-white' : 'text-slate-400'}">${dayTasks.length}</span>` : ''}
      </button>`;
  }
  grid.innerHTML = html;
}

/* --------------------------------- Modal --------------------------------- */
const modal = document.getElementById('taskModal');
const form = document.getElementById('taskForm');
let pendingImage = null;

function openModal(task = null) {
  form.reset();
  pendingImage = task?.image || null;
  document.getElementById('taskId').value = task?.id || '';
  document.getElementById('modalTitle').textContent = task ? 'Editar tarea' : 'Nueva tarea';
  document.getElementById('taskTitle').value = task?.title || '';
  document.getElementById('taskDescription').value = task?.description || '';
  document.getElementById('taskRepeats').checked = !!task?.repeats;
  document.getElementById('repeatFields').classList.toggle('hidden', !task?.repeats);
  document.getElementById('taskRepeatEvery').value = task?.repeatEvery || 1;
  document.getElementById('taskRepeatUnit').value = task?.repeatUnit || 'day';
  document.querySelectorAll('.repeatDayCheckbox').forEach(cb => {
    cb.checked = (task?.repeatDays || []).includes(parseInt(cb.value, 10));
  });
  const defaultWeekday = task?.dueDate
    ? (new Date(task.dueDate + 'T00:00:00').getDay() + 6) % 7
    : (new Date().getDay() + 6) % 7;
  document.getElementById('taskRepeatWeekday').value = (task?.repeatUnit === 'week' && task?.repeatDays?.length)
    ? task.repeatDays[0]
    : defaultWeekday;
  updateRepeatUnitUI();
  document.getElementById('taskDueDate').value = task?.dueDate || '';
  document.getElementById('taskTime').value = task?.time || '';
  document.getElementById('deleteTaskBtn').classList.toggle('hidden', !task);
  const preview = document.getElementById('taskImagePreview');
  if (task?.image) { preview.src = task.image; preview.classList.remove('hidden'); }
  else { preview.classList.add('hidden'); }
  modal.classList.remove('hidden');
  modal.classList.add('flex');
}
function closeModal() {
  modal.classList.add('hidden');
  modal.classList.remove('flex');
}

function updateRepeatUnitUI() {
  const unit = document.getElementById('taskRepeatUnit').value;
  const isWeekdays = unit === 'weekdays';
  const isWeek = unit === 'week';
  document.getElementById('repeatWeekdaysField').classList.toggle('hidden', !isWeekdays);
  document.getElementById('repeatWeekdayField').classList.toggle('hidden', !isWeek);
  document.getElementById('repeatEveryGroup').classList.toggle('hidden', isWeekdays);
}

document.getElementById('openAddBtn').addEventListener('click', () => openModal());
document.getElementById('closeModalBtn').addEventListener('click', closeModal);
document.getElementById('cancelModalBtn').addEventListener('click', closeModal);

document.getElementById('taskRepeats').addEventListener('change', e => {
  document.getElementById('repeatFields').classList.toggle('hidden', !e.target.checked);
});

document.getElementById('taskRepeatUnit').addEventListener('change', updateRepeatUnitUI);

document.getElementById('taskImage').addEventListener('change', async e => {
  const file = e.target.files[0];
  if (!file) return;
  pendingImage = await resizeImage(file);
  const preview = document.getElementById('taskImagePreview');
  preview.src = pendingImage;
  preview.classList.remove('hidden');
});

form.addEventListener('submit', async e => {
  e.preventDefault();
  const id = document.getElementById('taskId').value || uid();
  const existing = state.tasks.find(t => t.id === id);

  const repeatUnit = document.getElementById('taskRepeatUnit').value;
  const repeatDays = Array.from(document.querySelectorAll('.repeatDayCheckbox:checked')).map(cb => parseInt(cb.value, 10));
  if (document.getElementById('taskRepeats').checked && repeatUnit === 'weekdays' && repeatDays.length === 0) {
    alert('Elige al menos un día de la semana.');
    return;
  }

  const submitBtn = form.querySelector('button[type="submit"]');
  submitBtn.disabled = true;
  submitBtn.textContent = 'Guardando...';

  const imageValue = await uploadImageToSupabase(id, pendingImage);

  const task = {
    id,
    title: document.getElementById('taskTitle').value.trim(),
    description: document.getElementById('taskDescription').value.trim(),
    user: existing?.user || state.sessionUser || 'u1',
    repeats: document.getElementById('taskRepeats').checked,
    repeatEvery: parseInt(document.getElementById('taskRepeatEvery').value, 10) || 1,
    repeatUnit,
    repeatDays: repeatUnit === 'weekdays' ? repeatDays : repeatUnit === 'week' ? [parseInt(document.getElementById('taskRepeatWeekday').value, 10)] : null,
    dueDate: document.getElementById('taskDueDate').value || null,
    time: document.getElementById('taskTime').value || null,
    image: imageValue,
    createdAt: existing?.createdAt || Date.now(),
    completedDates: existing?.completedDates || [],
  };
  if (existing) Object.assign(existing, task);
  else state.tasks.push(task);
  persist();
  closeModal();
  render();

  submitBtn.disabled = false;
  submitBtn.textContent = 'Guardar';
  saveTaskToSupabase(task);
});

document.getElementById('deleteTaskBtn').addEventListener('click', () => {
  const id = document.getElementById('taskId').value;
  if (!id) return;
  if (!confirm('¿Eliminar esta tarea?')) return;
  state.tasks = state.tasks.filter(t => t.id !== id);
  persist();
  closeModal();
  render();
  deleteTaskFromSupabase(id);
});

/* ------------------------------ Delegación de eventos ------------------------------ */
document.body.addEventListener('click', e => {
  const tabBtn = e.target.closest('[data-tab]');
  if (tabBtn) { state.activeTab = tabBtn.dataset.tab; render(); return; }

  const card = e.target.closest('[data-id]');
  if (card) {
    const task = state.tasks.find(t => t.id === card.dataset.id);
    if (!task) return;

    const actionBtn = e.target.closest('[data-action]');
    if (!actionBtn) return;
    const action = actionBtn.dataset.action;
    if (action === 'edit') openModal(task);
    if (action === 'toggleDone' && actionBtn.tagName === 'BUTTON') {
      const dateKey = actionBtn.dataset.date;
      task.completedDates = task.completedDates || [];
      const idx = task.completedDates.indexOf(dateKey);
      if (idx >= 0) task.completedDates.splice(idx, 1);
      else task.completedDates.push(dateKey);
      persist();
      render();
      saveTaskToSupabase(task);
    }
    if (action === 'toggleDetails') {
      const details = card.querySelector('.task-details');
      if (!details) return;
      details.classList.toggle('hidden');
      const isOpen = !details.classList.contains('hidden');
      actionBtn.classList.toggle('text-indigo-600', isOpen);
    }
    return;
  }

  const dayBtn = e.target.closest('[data-day]');
  if (dayBtn) { state.selectedDate = dayBtn.dataset.day; state.activeTab = 'daily'; render(); return; }
});

document.body.addEventListener('change', e => {
  const checkbox = e.target.closest('[data-action="toggleDone"]');
  if (!checkbox) return;
  const card = e.target.closest('[data-id]');
  const task = state.tasks.find(t => t.id === card.dataset.id);
  const dateKey = checkbox.dataset.date;
  task.completedDates = task.completedDates || [];
  const idx = task.completedDates.indexOf(dateKey);
  if (idx >= 0) task.completedDates.splice(idx, 1);
  else task.completedDates.push(dateKey);
  persist();
  render();
  saveTaskToSupabase(task);
});

document.getElementById('prevMonthBtn').addEventListener('click', () => {
  state.calendarMonth = new Date(state.calendarMonth.getFullYear(), state.calendarMonth.getMonth() - 1, 1);
  render();
});
document.getElementById('nextMonthBtn').addEventListener('click', () => {
  state.calendarMonth = new Date(state.calendarMonth.getFullYear(), state.calendarMonth.getMonth() + 1, 1);
  render();
});

document.getElementById('backToTodayBtn').addEventListener('click', () => {
  state.selectedDate = todayStr();
  render();
});

document.getElementById('prevWeekBtn').addEventListener('click', () => {
  state.weekStart = new Date(state.weekStart.getFullYear(), state.weekStart.getMonth(), state.weekStart.getDate() - 7);
  render();
});
document.getElementById('nextWeekBtn').addEventListener('click', () => {
  state.weekStart = new Date(state.weekStart.getFullYear(), state.weekStart.getMonth(), state.weekStart.getDate() + 7);
  render();
});

/* ------------------------- PWA: manifest e ícono por sesión -------------------------
   Se usan archivos estáticos reales (no blob: URLs): el servicio que empaqueta la PWA
   en Android (WebAPK) necesita poder descargar el manifest y el ícono por red, y no
   tiene acceso a blob: URLs generadas en la página. */
function setupPwaManifest() {
  const isAnais = state.sessionUser === 'u2';
  const iconUrl = isAnais ? 'img/anais-icon-512.png' : 'img/angel-icon-512.png';
  const name = isAnais ? 'Tareas de Anaís' : 'Tareas de Angel';
  const manifestUrl = isAnais ? 'manifest-anais.json' : 'manifest-angel.json';

  let link = document.getElementById('manifestLink');
  if (!link) {
    link = document.createElement('link');
    link.id = 'manifestLink';
    link.rel = 'manifest';
    document.head.appendChild(link);
  }
  link.href = manifestUrl;

  let appleIcon = document.getElementById('appleTouchIcon');
  if (!appleIcon) {
    appleIcon = document.createElement('link');
    appleIcon.id = 'appleTouchIcon';
    appleIcon.rel = 'apple-touch-icon';
    document.head.appendChild(appleIcon);
  }
  appleIcon.href = iconUrl;

  let appleTitle = document.getElementById('appleTitle');
  if (!appleTitle) {
    appleTitle = document.createElement('meta');
    appleTitle.id = 'appleTitle';
    appleTitle.name = 'apple-mobile-web-app-title';
    document.head.appendChild(appleTitle);
  }
  appleTitle.content = name;

  document.title = name;
  const bannerIcon = document.getElementById('installBannerIcon');
  if (bannerIcon) bannerIcon.src = iconUrl;
}
setupPwaManifest();

/* ------------------------- PWA: instalar en escritorio ------------------------- */
let deferredInstallPrompt = null;

function isStandalone() {
  return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
}

function showInstallBanner(iosFallback) {
  if (isStandalone()) return;
  const banner = document.getElementById('installBanner');
  const btn = document.getElementById('installBtn');
  const text = document.getElementById('installBannerText');
  if (iosFallback) {
    btn.classList.add('hidden');
    text.textContent = 'Toca el botón compartir ⬆️ y luego "Agregar a pantalla de inicio" para instalar esta app.';
  } else {
    btn.classList.remove('hidden');
    text.textContent = 'Agrega esta app a tu pantalla de inicio para acceso rápido.';
  }
  banner.classList.remove('hidden');
}

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredInstallPrompt = e;
  showInstallBanner(false);
});

window.addEventListener('appinstalled', () => {
  document.getElementById('installBanner').classList.add('hidden');
  deferredInstallPrompt = null;
});

document.getElementById('installBtn').addEventListener('click', async () => {
  if (!deferredInstallPrompt) return;
  deferredInstallPrompt.prompt();
  await deferredInstallPrompt.userChoice;
  deferredInstallPrompt = null;
  document.getElementById('installBanner').classList.add('hidden');
});

document.getElementById('installDismissBtn').addEventListener('click', () => {
  document.getElementById('installBanner').classList.add('hidden');
});

/* ----------------------------------- Init ----------------------------------- */
window.addEventListener('load', async () => {
  render();
  await loadTasksFromSupabase();
  render();

  setInterval(() => { if (state.activeTab === 'daily') renderDailySchedule(); }, 60000);

  if (/iphone|ipad|ipod/i.test(navigator.userAgent) && !isStandalone()) {
    showInstallBanner(true);
  }

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
});
</script>
